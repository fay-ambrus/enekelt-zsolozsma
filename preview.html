<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gregosheet Melody Preview</title>
<style>
  @font-face {
    font-family: 'GuidoHU';
    src: url('GuidoHU.ttf') format('truetype');
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: monospace;
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 20px;
    min-height: 100vh;
  }

  h1 {
    font-size: 14px;
    color: #888;
    margin-bottom: 16px;
    font-weight: normal;
    letter-spacing: 0.05em;
  }

  label {
    display: block;
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  textarea {
    width: 100%;
    background: #252526;
    border: 1px solid #3c3c3c;
    color: #d4d4d4;
    font-family: monospace;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    outline: none;
    border-radius: 3px;
    min-height: 80px;
  }

  textarea:focus {
    border-color: #007acc;
  }

  .section-label {
    font-size: 10px;
    color: #888;
    margin-top: 14px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .preview-box {
    background: #fff;
    border-radius: 3px;
    padding: 16px 16px 12px;
    min-height: 80px;
    overflow-x: auto;
  }

  .music-render {
    font-family: 'GuidoHU', monospace;
    font-size: 32px;
    line-height: 1;
    white-space: pre;
    color: #000;
    display: block;
  }

  /* Each character is a span; backslashes are hidden */
  .music-render span {
    display: inline;
    border-radius: 2px;
  }

  /* Cursor highlight */
  .music-render span.cursor {
    background: rgba(0, 122, 204, 0.25);
    outline: 2px solid #007acc;
    outline-offset: 1px;
    border-radius: 2px;
  }

  /* Selection range highlight */
  .music-render span.selected {
    background: rgba(0, 122, 204, 0.15);
  }

  .char-table {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-height: 300px;
    overflow-y: auto;
  }

  .char-cell {
    background: #252526;
    border: 1px solid #3c3c3c;
    border-radius: 3px;
    padding: 4px 6px;
    text-align: center;
    min-width: 52px;
    cursor: pointer;
    user-select: none;
  }

  .char-cell:hover { border-color: #007acc; }
  .char-cell:active { background: #2a2d2e; }

  .char-glyph {
    font-family: 'GuidoHU', monospace;
    font-size: 24px;
    line-height: 1.2;
    display: block;
    color: #000;
    background: #fff;
    border-radius: 2px;
    padding: 2px 4px;
    margin-bottom: 2px;
  }

  .char-code {
    font-size: 9px;
    color: #666;
    display: block;
  }

  .category {
    font-size: 11px;
    color: #569cd6;
    margin-top: 12px;
    margin-bottom: 4px;
    font-weight: bold;
    width: 100%;
  }

  details summary {
    cursor: pointer;
    font-size: 12px;
    color: #569cd6;
    margin-top: 20px;
    margin-bottom: 4px;
    user-select: none;
  }

  details summary:hover { color: #79c0ff; }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #007acc;
    color: white;
    padding: 8px 14px;
    border-radius: 3px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>Gregosheet Melody Preview</h1>

<label>Melody string</label>
<textarea id="melody" rows="5" spellcheck="false" placeholder="Paste melody here..."></textarea>

<div class="section-label">Rendered melody</div>
<div class="preview-box">
  <span class="music-render" id="music-out"></span>
</div>

<details>
  <summary>Character reference (click to insert)</summary>
  <div class="char-table" id="char-table"></div>
</details>

<div class="toast" id="toast"></div>

<script>
  const melodyEl = document.getElementById('melody');
  const musicOut  = document.getElementById('music-out');
  const toast     = document.getElementById('toast');

  // Build per-character spans so we can highlight by textarea index
  function renderMelody(str) {
    musicOut.innerHTML = '';
    const chars = [...str]; // Unicode-aware split
    chars.forEach((ch, i) => {
      const span = document.createElement('span');
      span.dataset.idx = i;
      span.textContent = ch;
      musicOut.appendChild(span);
    });
  }

  function highlightCursor() {
    const start = melodyEl.selectionStart;
    const end   = melodyEl.selectionEnd;
    const spans = musicOut.querySelectorAll('span[data-idx]');

    spans.forEach(sp => {
      const i = parseInt(sp.dataset.idx);
      sp.classList.remove('cursor', 'selected');
      if (start === end) {
        // Point cursor: highlight char just before cursor (or after if at 0)
        if (i === Math.max(0, start - 1)) sp.classList.add('cursor');
      } else {
        // Range selection
        if (i >= start && i < end) sp.classList.add('selected');
      }
    });
  }

  function update() {
    renderMelody(melodyEl.value);
    highlightCursor();
  }

  // Update content on input, update highlight on any cursor movement
  melodyEl.addEventListener('input',     update);
  melodyEl.addEventListener('keyup',     highlightCursor);
  melodyEl.addEventListener('mouseup',   highlightCursor);
  melodyEl.addEventListener('click',     highlightCursor);
  melodyEl.addEventListener('focus',     highlightCursor);
  melodyEl.addEventListener('selectionchange', highlightCursor);

  // Character reference table
  const categories = {
    'Notes': '0123456789öüóqwertzuiopõúÝÞQWERTZUIOPÕÚÔasdfghjkléáûØÙASDFGHJKLÉÁÛíyxcvbnmzZYXCVBNM÷$?:_',
    'Barlines / breaks': ',.;\'"+=!()/%-',
    'Symbols': 'sM>#&{}',
    'Special chars': 'çèêëìîïàâãäåæ°±²³´µ¸¹¾Ç',
  };

  const tableEl = document.getElementById('char-table');
  for (const [cat, chars] of Object.entries(categories)) {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.textContent = cat;
    tableEl.appendChild(catDiv);

    for (const ch of [...chars]) {
      const cell = document.createElement('div');
      cell.className = 'char-cell';
      cell.title = `Insert "${ch}"`;
      cell.innerHTML = `<span class="char-glyph">${ch}</span><span class="char-code">${ch.codePointAt(0).toString(16).toUpperCase()}</span>`;
      cell.addEventListener('click', () => {
        const start = melodyEl.selectionStart;
        const end   = melodyEl.selectionEnd;
        const val   = melodyEl.value;
        melodyEl.value = val.slice(0, start) + ch + val.slice(end);
        melodyEl.selectionStart = melodyEl.selectionEnd = start + ch.length;
        melodyEl.focus();
        update();
        showToast(`Inserted: ${ch}`);
      });
      tableEl.appendChild(cell);
    }
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  // Pre-fill example
  melodyEl.value = '<-6---5zZ5T4x-:-4çz-5zZ5T4x-:-4---6----8--7i-8v---8--iI\u005C7-8o-iI7U6-6c--,-5Úop-9--9----8iI7-8--8oO8-6c---6c-:-6êiI7U6-5---5z-tT4-4-,-4--4i--8iI7-8--8oO8-6c---6c-,,-5o-oO8-9p-9-----9---iI\u005C7-8v-:-8--8iI7-8--8oO8-uU6-5z-6c-,,-6êiI7U6-5z--t\u005CT4-4i-iI7-8oO88-6c-.';
  update();
</script>
</body>
</html>
